# Local OpenTelemetry stack for trace inspection during development.
#
#   docker compose -f infra/otel/docker-compose.yml up -d
#
# Then run the app with traces pointed at the collector:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 npm run dev
#
# UIs:
#   Jaeger      http://localhost:16686
#   Zipkin      http://localhost:9411
#   Prometheus  http://localhost:9090
#
# The collector receives OTLP (gRPC 4317 / HTTP 4318) from @vercel/otel and fans
# traces out to Jaeger + Zipkin and metrics to Prometheus.
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus scrape endpoint (collector metrics exporter)
    depends_on:
      - jaeger
      - zipkin

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI

  zipkin:
    image: openzipkin/zipkin:3.4
    ports:
      - "9411:9411" # Zipkin UI

  prometheus:
    image: prom/prometheus:v3.0.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090" # Prometheus UI
