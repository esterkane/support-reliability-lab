name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Browser e2e against a production build. Not a required check (keeps `quality`
  # fast); failures surface on the run without blocking.
  e2e:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e

  # Self-contained k6 smoke against a local production build. Once a Vercel preview
  # URL is available, set PREVIEW_URL and point BASE_URL at it instead.
  # Gate production promotion on `quality` via Vercel Deployment Checks.
  performance-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6
      - name: Start app and run k6 smoke
        env:
          PORT: "3100"
          BASE_URL: ${{ secrets.PREVIEW_URL || 'http://127.0.0.1:3100' }}
        run: |
          npm run start & APP_PID=$!
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:3100 >/dev/null && break || sleep 1; done
          k6 run perf/smoke.js
          kill $APP_PID || true
