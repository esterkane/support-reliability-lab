name: ci
on:
  pull_request:
  push:
    branches: [main]

# Run JS-based actions on Node 24 (silences the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # Wire this up once a preview URL is available (Vercel sets it on the PR).
  # Gate production promotion on `quality` via Vercel Deployment Checks.
  performance-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: perf/smoke.js
        env:
          BASE_URL: ${{ secrets.PREVIEW_URL || 'http://127.0.0.1:3000' }}
